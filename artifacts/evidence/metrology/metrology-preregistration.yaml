schema_version: proprio.metrology_preregistration.v0.1
frozen_at: "2026-07-09T00:00:00Z"
claim_boundary: >-
  Simulation-validated pre-deployment measurement validity for synthetic
  calibrant/QC frames. This is not real-hardware qualification.
battery:
  seed: 20260709
  cases_per_class: 300
  false_valid_max_observed: 0
  false_reject_rate_max: 0.05
instrument:
  geometry_id: cu-kalpha-area-detector-v0.1
  shape: [256, 256]
  pixel_size_m: 0.0002
  distance_m: 0.025
  center_y_px: 127.5
  center_x_px: 127.5
  wavelength_m: 1.5406e-10
  detector_max_counts: 65535.0
  exposure_s: 1.0
  radial_range_deg: [15.0, 55.0]
  radial_bins: 512
calibrants:
  lab6:
    role: primary
    lattice_a_angstrom: 4.1569
    expected_peaks_deg:
      - 21.3579885232
      - 30.3849891699
      - 37.4419863833
      - 43.5068200712
      - 48.9577377059
      - 53.9891358413
    sources:
      - https://tsapps.nist.gov/srmext/certificates/archives/660.pdf
      - https://pyfai.readthedocs.io/en/stable/calibration.html
  si:
    role: secondary
    lattice_a_angstrom: 5.4310
    expected_peaks_deg:
      - 28.4421016380
      - 47.3022941879
    sources:
      - https://tsapps.nist.gov/srmext/certificates/archives/640f.pdf
      - https://pyfai.readthedocs.io/en/stable/calibration.html
generator:
  engine: analytic_numpy_bragg_ring_v1
  peak_fwhm_deg: 0.45
  background_counts: 40.0
  primary_peak_counts: 18000.0
  sources:
    - https://tsapps.nist.gov/srmext/certificates/archives/660.pdf
    - https://tsapps.nist.gov/srmext/certificates/archives/640f.pdf
thresholds:
  zero_shift_abs_max_deg:
    value: 0.20
    comparator: le
    rationale: >-
      Bound is below half the simulated 0.45 degree FWHM while remaining above
      centroid quantization for the declared detector geometry.
  sample_displacement_residual_max_deg:
    value: 0.12
    comparator: le
    rationale: >-
      After removal of a constant zero shift, calibrant peak residuals must
      remain within the detector-geometry centroid tolerance.
  calibrated_peak_fwhm_max_deg:
    value: 0.80
    comparator: le
    rationale: >-
      The qualified line width may broaden from the 0.45 degree generator width
      but must not approach twice the declared instrumental width.
  saturation_fraction_max:
    value: 0.00001
    comparator: le
    rationale: >-
      A calibrant/QC frame may not depend on clipped peak pixels for its fitted
      geometry.
  dead_time_fraction_max:
    value: 0.05
    comparator: le
    rationale: >-
      Count-rate compression above five percent is classified invalid rather
      than silently corrected in the v0.1 reference instrument.
  peak_snr_min:
    value: 12.0
    comparator: ge
    rationale: >-
      Each qualified calibrant frame must resolve its median expected ring by
      at least twelve background standard deviations.
  cake_coverage_min:
    value: 0.80
    comparator: ge
    rationale: >-
      At least eighty percent of sampled azimuth sectors must contain the
      expected calibrant rings after masking.
  unexpected_peak_ratio_max:
    value: 0.05
    comparator: le
    rationale: >-
      Calibrant/QC-only check: unindexed peak prominence may contribute no more
      than five percent of total detected prominence.
  reduced_chi2_lower_alpha:
    value: 0.001
    comparator: ge
    rationale: >-
      The lower-tail probability is conditioned on fitted degrees of freedom
      and the declared counting-uncertainty model; a scalar chi-squared below
      one is not itself a failure.
faults:
  geometry_miscalibration:
    center_offset_px: [5.0, 8.0]
  zero_shift:
    shift_deg: [0.45, 0.70]
  sample_displacement:
    distance_fraction: [0.05, 0.08]
  saturation:
    intensity_multiplier: [8.0, 12.0]
  dead_time:
    fraction: [0.12, 0.25]
  insufficient_counts:
    intensity_scale: [0.0005, 0.0015]
  cake_integration_failure:
    missing_sector_deg: [100.0, 140.0]
  unindexed_peak:
    peak_deg: [33.5, 34.5]
  chi2_lower_tail:
    reported_variance_scale: [1000000.0, 2000000.0]

