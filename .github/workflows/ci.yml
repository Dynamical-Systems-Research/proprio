name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Check out pinned external simulators
        run: |
          mkdir -p /tmp/proprio-candidates
          git clone --quiet --filter=blob:none --no-checkout https://github.com/AccelerationConsortium/North-Cytation /tmp/proprio-candidates/North-Cytation
          git -C /tmp/proprio-candidates/North-Cytation sparse-checkout set sdl_pipette_calibration/protocols
          git -C /tmp/proprio-candidates/North-Cytation checkout --quiet 3f49b5faba803a4a5d22544aa2ea5923ec513e20
          git clone --quiet --filter=blob:none --no-checkout https://github.com/helgestein/helao-pub /tmp/proprio-candidates/helao-pub
          git -C /tmp/proprio-candidates/helao-pub sparse-checkout set driver
          git -C /tmp/proprio-candidates/helao-pub checkout --quiet d644716e17c40c2bdfce74d5ebe82a04ff70cc6a
          git clone --quiet --filter=blob:none --no-checkout https://github.com/sparks-baird/self-driving-lab-demo /tmp/proprio-candidates/self-driving-lab-demo
          git -C /tmp/proprio-candidates/self-driving-lab-demo sparse-checkout set src
          git -C /tmp/proprio-candidates/self-driving-lab-demo checkout --quiet 34e4e8cd880bc7b788109d8a56da3f6fae978518
      - run: uv sync --locked --extra dev --extra openflexure --extra generalization
      # These source files are byte-bound by the v0.3 method manifest and cannot
      # be mechanically rewritten after binding exposure.
      - run: uv run ruff format --check . --exclude "src/proprio/generalization_*.py"
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run proprio procedural-battery --output-dir artifacts/generated/ci/procedural
      - run: uv run proprio metrology --cases-per-class 300 --output-dir artifacts/generated/ci/metrology
      - run: uv run proprio support-battery --output-dir artifacts/generated/ci/support
      - run: uv run proprio composition-battery --output-dir artifacts/generated/ci/composition
      - run: uv run proprio skill-admission --cassette-dir cassettes/dsv4 --output-dir artifacts/generated/ci/skill-admission
      - run: uv run proprio confirmatory-metrology --cases-per-class 300 --output-dir artifacts/generated/ci/confirmatory-metrology
      - run: uv run proprio confirmatory-study-replay --cassette-dir cassettes/confirmatory-dsv4 --output-dir artifacts/generated/ci/confirmatory-replay
      - run: uv run proprio confirmatory-judge-metrology-replay --cassette-dir cassettes/judge-metrology-confirmatory
      - run: uv run proprio microscopy-metrology --reference-dir artifacts/evidence/microscopy/locked/reference --output-dir artifacts/generated/ci/microscopy-metrology --cases-per-class 300
      - run: uv run proprio engineering-burden --output-dir artifacts/generated/ci/engineering-burden
      - name: Verify expanded evidence (failed external gates remain fail-closed)
        run: uv run pytest -q tests/test_expanded_evidence.py
      - run: uv run proprio evolution-replay --cassette-dir cassettes/dsv4-evolution --output-dir artifacts/generated/ci/evolution-replay
      - run: uv run proprio evidence-manifest --root . --output artifacts/generated/ci/evidence-manifest.json
