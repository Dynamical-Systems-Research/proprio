name: OpenFlexure release validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PROPRIO_OPENFLEXURE_ROOT: /tmp/proprio-candidates/openflexure-microscope-server
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Check out pinned simulators
        run: |
          mkdir -p /tmp/proprio-candidates
          git clone --quiet --filter=blob:none --no-checkout https://github.com/AccelerationConsortium/North-Cytation /tmp/proprio-candidates/North-Cytation
          git -C /tmp/proprio-candidates/North-Cytation sparse-checkout set sdl_pipette_calibration/protocols
          git -C /tmp/proprio-candidates/North-Cytation checkout --quiet 3f49b5faba803a4a5d22544aa2ea5923ec513e20
          git clone --quiet --filter=blob:none --no-checkout https://github.com/helgestein/helao-pub /tmp/proprio-candidates/helao-pub
          git -C /tmp/proprio-candidates/helao-pub sparse-checkout set driver
          git -C /tmp/proprio-candidates/helao-pub checkout --quiet d644716e17c40c2bdfce74d5ebe82a04ff70cc6a
          git clone --quiet --filter=blob:none --no-checkout https://github.com/sparks-baird/self-driving-lab-demo /tmp/proprio-candidates/self-driving-lab-demo
          git -C /tmp/proprio-candidates/self-driving-lab-demo sparse-checkout set src
          git -C /tmp/proprio-candidates/self-driving-lab-demo checkout --quiet 34e4e8cd880bc7b788109d8a56da3f6fae978518
          git clone --quiet --filter=blob:none https://gitlab.com/openflexure/openflexure-microscope-server /tmp/proprio-candidates/openflexure-microscope-server
          git -C /tmp/proprio-candidates/openflexure-microscope-server checkout --quiet d26b93e1be1093e9d696b634dd1f7dde3bb7142a
      - run: uv sync --locked --extra simulators --extra openflexure
      - name: Start pinned OpenFlexure simulator
        run: |
          uv venv --python 3.11 /tmp/proprio-candidates/openflexure-microscope-server/.venv
          uv pip install --python /tmp/proprio-candidates/openflexure-microscope-server/.venv/bin/python --editable /tmp/proprio-candidates/openflexure-microscope-server python-gitlab
          /tmp/proprio-candidates/openflexure-microscope-server/.venv/bin/python /tmp/proprio-candidates/openflexure-microscope-server/pull_webapp.py -b v3
          cd /tmp/proprio-candidates/openflexure-microscope-server
          .venv/bin/openflexure-microscope-server -c ofm_config_simulation.json --host 127.0.0.1 --port 5100 > /tmp/openflexure.log 2>&1 &
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:5100/openapi.json > /dev/null && exit 0
            sleep 1
          done
          cat /tmp/openflexure.log
          exit 1
      - name: Rebuild verified skill library
        run: uv run proprio publish-skills --root .
      - name: Verify published records are current
        run: git diff --exit-code -- catalog.json skills
