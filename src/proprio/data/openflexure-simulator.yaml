schema_version: proprio.external_simulator.v0.1
instrument_id: microscope-autofocus
family: optical_microscopy
repository: https://gitlab.com/openflexure/openflexure-microscope-server
revision: d26b93e1be1093e9d696b634dd1f7dde3bb7142a
branch: v3
license: GPL-3.0-only
integration: external_process_public_api
redistributed: false
api_prefix: /api/v3
openapi_document: /openapi.json
public_things:
  - camera
  - stage
  - autofocus
simulation_config: ofm_config_simulation.json
runtime:
  python: "3.11"
  static_ui_command: python pull_webapp.py -b v3
  server_command: >-
    openflexure-microscope-server -c ofm_config_simulation.json
    --host 127.0.0.1 --port 5100
qualification_boundary: >-
  Proprio consumes public API outputs and computes independent image and lifecycle checks.
  The external simulator remains a release-lane dependency and is not part of the Apache core.
