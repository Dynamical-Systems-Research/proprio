schema_version: proprio.adaptive_microscopy_thresholds.v0.2
status: preregistered_development
registered_at: "2026-07-10"
instrument_id: microscope-autofocus
simulator:
  repository: https://gitlab.com/openflexure/openflexure-microscope-server
  revision: d26b93e1be1093e9d696b634dd1f7dde3bb7142a
autofocus_curve:
  minimum_samples: 15
  reference_z: 0.0
  reference_tolerance_steps: 150.0
  peak_prominence_minimum: 0.5
  selected_peak_tolerance_steps: 150.0
  reference_coverage_required: true
  status: registered_before_labeled_curve_battery
  basis: >-
    The primary forward autofocus sweep must contain at least fifteen camera samples, cover the
    calibrated plane, produce a prominent image-sharpness peak near that plane, and leave the
    independently read stage at the selected peak. Thresholds were fixed before the replacement
    labeled curve battery.
temporal_relative_standard_error:
  maximum: 0.011
  status: preregistered_development
  basis: >-
    The standard error of the repeated-frame mean must be no more than 1.1 percent of the spatial
    image contrast. This acquisition-uncertainty limit was fixed after an exploratory external-
    simulator noise sweep and before the labeled repeated-measurement battery.
acquisition_time_seconds:
  maximum: 8.3
  stage_steps_per_second: 1000.0
  raw_frame_seconds: 0.1
  status: registered_before_causal_fault_factorial
  basis: >-
    The development procedure has a fixed incremental acquisition-time budget. The upstream
    simulator moves at 1,000 stage steps per second and produces camera frames at approximately
    0.1 second per frame. Fixed calibration and image-processing overhead is common to candidates
    and excluded. The limit admits either an 8,000-step sweep with three qualification frames or a
    4,000-step sweep with up to five frames.
residual_correlation: >-
  The sweep sharpness curve and independent stage read both originate from the same external
  simulator process. Raw-frame integrity and temporal uncertainty are computed independently,
  but shared-simulator correlation remains and is reported rather than treated as eliminated.
