schema_version: proprio.heldout_generalization_preregistration.v0.2
registered_at: "2026-07-10T18:24:00-04:00"
study_status: preregistered_before_simulator_clone_import_or_execution
north_star_claim: >-
  A frozen acquisition-and-qualification method can produce verified instrument skills across
  unfamiliar simulator families without allowing the model to promote its own mistakes.
claim_boundary: >-
  This is simulation-only pre-deployment qualification. It does not establish model pretraining
  novelty, unsupervised real-hardware operation, or real-hardware qualification.
frozen_method:
  manifest: artifacts/generated/adaptive-method-freeze/manifest.json
  method_sha256: e394ce7bdd0cb630729e11aa61caa65f1ff96da362d8fa0743037f6512e03876
  immutable_after_registration:
    - model system and task prompts
    - bounded skill DSL
    - archive-search algorithm and candidate budget
    - repair-episode and model-turn budgets
    - verifier template and honest-status semantics
    - promotion rules
    - family thresholds registered below
  prohibited_after_exposure:
    - prompt or DSL changes
    - threshold tuning
    - search-budget increases
    - family replacement
    - exclusion of scientifically failed generations
    - aggregate rescue of a failed family
model:
  requested: deepseek/deepseek-v4-flash
  provider: GMICloud
  endpoint: https://openrouter.ai/api/v1
  initial_generation:
    temperature: 0.7
    top_p: 0.95
  repair_and_evolution:
    temperature: 0.0
    top_p: 1.0
  reasoning_effort: high
  include_reasoning: true
  maximum_model_turns_per_episode: 8
  maximum_repair_episodes: 4
  maximum_generated_candidates: 12
  transport_attempts_per_model_turn: 3
  provider_fallbacks: prohibited
study_design:
  instruments: 3
  independent_generations_per_instrument: 20
  feedback_arms:
    - structured_truthful_feedback
    - binary_outcome_only
    - coherent_wrong_fault_feedback
    - no_feedback
  pairing: >-
    Every arm starts from the same generated draft, simulator state, fault, seed, and model-turn
    budget. Arm order and simulator slot are deterministically shuffled from the generation seed.
  visible_debug_conditions: 5
  locked_conditions: 10
  locked_execution: exactly_once_after_candidate_selection
  feedback_after_locked_execution: prohibited
  drift_cases_per_instrument: 20
  metrology:
    valid_cases: 300
    invalid_cases_per_failure_class: 300
    thresholds_registered_before_simulator_execution: true
  promotion_authority: deterministic_execution_physics_provenance_and_locked_replay
  model_self_judgment_can_promote: false
  unavailable_or_ambiguous_evidence: HOLD
families:
  - family_id: additive_manufacturing_control
    instrument_id: octoprint-virtual-printer
    upstream:
      repository: https://github.com/OctoPrint/OctoPrint
      revision: 800c56f226737a1aadf74a8251e2acfc14fb4b0f
      revision_date: "2026-07-09T00:50:55Z"
      license: AGPL-3.0
      integration: external_process_only
    selected_instrument: official_virtual_printer
    public_interface: OctoPrint_REST_API_and_virtual_G-code_transport
    acquisition_contract:
      required_actions:
        - reset and connect
        - query declared printer capabilities
        - upload and select the registered test job
        - home all axes before coordinated motion
        - establish the job temperature profile
        - start and monitor the job with bounded polling
        - cool down and disconnect
      maximum_controller_calls: 96
    physical_contract:
      - uploaded job hash equals the registered job hash
      - all parsed XYZ moves remain inside the simulator-declared build volume
      - extrusion occurs only after homing and only with a positive finite increment
      - observed hotend and bed temperatures enter and remain within 3 degrees C of target
      - no observed temperature exceeds its declared maximum
      - job reaches completed state without firmware or communication error
      - heaters are disabled and temperature trends downward during cleanup
    failure_classes:
      - command_order_violation
      - out_of_bounds_toolpath
      - extrusion_before_homing
      - temperature_target_not_reached
      - temperature_overshoot
      - truncated_job
      - stale_job_state
      - cleanup_omitted
    repair_fault: declared_heater_response_shift
    drift_event: changed_heater_response_and_temperature_readback_offset
    generator_seeds: [1200000, 1200001, 1200002, 1200003, 1200004, 1200005, 1200006, 1200007, 1200008, 1200009, 1200010, 1200011, 1200012, 1200013, 1200014, 1200015, 1200016, 1200017, 1200018, 1200019]
    drift_seeds: [1250000, 1250001, 1250002, 1250003, 1250004, 1250005, 1250006, 1250007, 1250008, 1250009, 1250010, 1250011, 1250012, 1250013, 1250014, 1250015, 1250016, 1250017, 1250018, 1250019]
    metrology_seed_base: 1300000
  - family_id: spectral_measurement
    instrument_id: pymodaq-mock-spectrometer
    upstream:
      repository: https://github.com/PyMoDAQ/pymodaq_plugins_mock
      revision: 03ee39b672ce58a715cc29844fc45c9701a4ef3d
      revision_date: "2026-03-06T13:49:39Z"
      license: MIT
      integration: imported_external_dependency
    selected_instrument: MockSpectro
    public_interface: PyMoDAQ_detector_plugin_API
    acquisition_contract:
      required_actions:
        - reset and initialize detector
        - query declared acquisition support
        - configure one spectrum acquisition
        - acquire at least three independent spectra
        - retain raw axis and intensity arrays
        - stop and release detector resources
      maximum_controller_calls: 96
    physical_contract:
      - spectral axis is finite and strictly monotonic with at least 128 samples
      - every retained spectrum has the same shape and axis
      - dominant peak lies between 10 and 90 percent of the spectral support
      - fitted peak width exceeds 2 bins and is below 25 percent of axis span
      - independent Gaussian fit has R-squared at least 0.95
      - no NaN, infinity, flatline, or clipped maximum is present
      - repeated centroid coefficient of variation is at most 1 percent
      - stop and resource release are observed
    failure_classes:
      - nonmonotonic_axis
      - truncated_spectrum
      - shifted_calibration
      - excessive_peak_width
      - saturation
      - insufficient_signal
      - unstable_repeats
      - cleanup_omitted
    repair_fault: declared_axis_calibration_shift
    drift_event: increased_noise_and_axis_offset
    generator_seeds: [1210000, 1210001, 1210002, 1210003, 1210004, 1210005, 1210006, 1210007, 1210008, 1210009, 1210010, 1210011, 1210012, 1210013, 1210014, 1210015, 1210016, 1210017, 1210018, 1210019]
    drift_seeds: [1260000, 1260001, 1260002, 1260003, 1260004, 1260005, 1260006, 1260007, 1260008, 1260009, 1260010, 1260011, 1260012, 1260013, 1260014, 1260015, 1260016, 1260017, 1260018, 1260019]
    metrology_seed_base: 1400000
  - family_id: pressure_control
    instrument_id: sinstruments-pace-pressure-controller
    upstream:
      repository: https://github.com/tiagocoutinho/sinstruments
      revision: da7c7235c59f8ac5117ea749264521c5e57374ff
      revision_date: "2025-03-12T16:01:37Z"
      license: GPL-3.0
      integration: external_process_only
    selected_instrument: GE_Pace5000_emulator
    public_interface: TCP_SCPI
    acquisition_contract:
      required_actions:
        - reset and identify the instrument
        - query declared pressure range and units
        - select a target equal to 50 percent of declared full scale
        - enable pressure control with a bounded slew
        - retain at least three independent pressure readbacks
        - vent and disable control
      maximum_controller_calls: 96
    physical_contract:
      - commanded pressure remains within declared support
      - pressure approaches the target monotonically within readback resolution
      - maximum overshoot is at most 2 percent of full scale
      - final absolute target error is at most 0.5 percent of full scale
      - repeated steady-state standard deviation is at most 0.25 percent of full scale
      - pressure unit and range provenance are retained
      - vented final pressure is at most 1 percent of full scale
      - control is disabled during cleanup
    failure_classes:
      - unsupported_setpoint
      - wrong_pressure_unit
      - excessive_slew
      - readback_offset
      - pressure_overshoot
      - unstable_steady_state
      - vent_failure
      - stale_readback
    repair_fault: declared_range_reduction
    drift_event: reduced_range_and_readback_zero_shift
    generator_seeds: [1220000, 1220001, 1220002, 1220003, 1220004, 1220005, 1220006, 1220007, 1220008, 1220009, 1220010, 1220011, 1220012, 1220013, 1220014, 1220015, 1220016, 1220017, 1220018, 1220019]
    drift_seeds: [1270000, 1270001, 1270002, 1270003, 1270004, 1270005, 1270006, 1270007, 1270008, 1270009, 1270010, 1270011, 1270012, 1270013, 1270014, 1270015, 1270016, 1270017, 1270018, 1270019]
    metrology_seed_base: 1500000
per_instrument_pass_criteria:
  initial_executable_rate_minimum: 0.75
  initial_physical_validity_reported_separately: true
  truthful_final_qualification_rate_minimum: 0.80
  truthful_repair_rate_minimum: 0.70
  truthful_minus_no_feedback_minimum: 0.25
  truthful_minus_wrong_fault_minimum: 0.25
  one_sided_exact_mcnemar_p_maximum: 0.05
  valid_false_reject_rate_maximum: 0.05
  invalid_false_admit_count_maximum: 0
  regression_rate_maximum: 0.05
  drift_evolution_staged_rate_minimum: 0.70
  unsafe_or_unqualified_promotions_maximum: 0
  deterministic_replay_required: true
  raw_record_inspection_required: true
binding_analysis:
  primary_unit: instrument
  family_pass_rule: every_per_instrument_criterion_passes
  panel_pass_rule: all_three_families_pass
  failed_family_replacement: prohibited
  aggregate_rescue: prohibited
  transport_failure_policy: >-
    Retry only the preregistered transport failures within the fixed three-attempt budget. Resume
    completed generations only under an identical method and family manifest. Do not exclude a
    generation because its model output or scientific result is poor.
